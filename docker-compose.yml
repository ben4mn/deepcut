services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: deepcut
      POSTGRES_PASSWORD: deepcut
      POSTGRES_DB: deepcut
    volumes:
      - deepcut_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deepcut -d deepcut"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      target: runner
    restart: unless-stopped
    ports:
      - "3020:3000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  worker:
    build:
      context: .
      target: worker
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  deepcut_pgdata:
    name: deepcut_pgdata
